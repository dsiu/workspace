# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - run: corepack enable
    - uses: actions/checkout@v6
      with:
        submodules: 'true'
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - run: yarn install
    - run: cd packages/rescript-relude && yarn install && yarn build
    - run: cd packages/rescript-relude-parse && yarn install && yarn build
    - run: cd packages/rescript-bastet && yarn install && yarn build
    - run: cd packages/rescript-graphology && yarn install && yarn build
    - run: yarn build
    - run: yarn workspace @jmagaram/rescript-extras run res:build
    - run: yarn workspace @jmagaram/rescript-seq run res:build
    - run: yarn test
